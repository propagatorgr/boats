<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Οριακή Ταχύτητα – Προσομοίωση</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <!-- sketch -->
  <script defer src="sketch.js"></script>

  <style>
    /* === Reset === */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
    }

    /* === Κεντρικό container === */
    .app {
      width: 100%;
      max-width: 1000px;
      padding: 12px;
    }

    /* === Χώρος canvas === */
    #sketch-holder {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    canvas {
      width: 100% !important;   /* responsive scaling */
      height: auto !important;
      border-radius: 8px;
    }

    /* === Χώρος χειριστηρίων === */
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls button {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .controls label {
      font-size: 14px;
      cursor: pointer;
    }

    /* === Μικρές οθόνες === */
    @media (max-width: 600px) {
      .controls {
        gap: 8px;
      }

      .controls button {
        font-size: 13px;
        padding: 6px 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Το p5 canvas θα μπει εδώ -->
    <div id="sketch-holder"></div>

    <!-- Τα κουμπιά/checks τα δημιουργεί το sketch.js
         και μπαίνουν αυτόματα κάτω από το canvas -->
  </div>
</body>
</html>
