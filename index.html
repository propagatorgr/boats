<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Οριακή Ταχύτητα</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(600px, 1fr) 300px;
      gap: 16px;
      max-width: 1400px;
      margin: auto;
      padding: 16px;
      align-items: start;
    }

    #sketch-holder {
      display: flex;
      justify-content: center;
    }

    canvas {
      border-radius: 10px;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- CANVAS -->
    <div id="sketch-holder"></div>

    <!-- PANELS -->
    <div>
      <div class="panel">
        <h3>ΣΤΟΙΧΕΙΑ</h3>
        <div id="info"></div>
      </div>

      <div class="panel">
        <h3>ΧΕΙΡΙΣΜΟΣ</h3>
        <button id="playBtn">▶ Play</button>
        <button id="resetBtn">⟲ Reset</button><br><br>
        <label>
          <input type="checkbox" id="forcesChk" checked>
          Εμφάνιση δυνάμεων
        </label>
      </div>
    </div>

  </div>

  <!-- ✅ SCRIPT LOAD – ΣΤΟ ΤΕΛΟΣ -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script src="sketch.js"></script>

</body>
</html>
