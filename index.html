<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Οριακή Ταχύτητα – Προσομοίωση</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  <script src="sketch.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
    }

    /* ===============================
       ΚΟΙΝΟ CONTAINER
       =============================== */
    .app {
      width: 100%;
      padding: 12px;
    }

    #sketch-holder {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    /* ===============================
       LAYOUT B – COMPACT (default)
       Για tablet / μικρά laptop
       =============================== */
    .app {
      max-width: 1000px;
    }

    /* ===============================
       LAYOUT A – CLASSROOM / PROJECTOR
       Για μεγάλες οθόνες
       =============================== */
    @media (min-width: 1200px) {
      body {
        justify-content: center;
      }

      .app {
        max-width: 1400px;   /* γεμίζει οπτικά την οθόνη */
      }

      canvas {
        width: 100%;
      }
    }

  </style>
</head>

<body>
  <div class="app">
    <div id="sketch-holder"></div>
  </div>
</body>
</html>
